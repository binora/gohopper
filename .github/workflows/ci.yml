name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Unit and Integration Tests
        run: make test

  conformance:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Cache GraphHopper JAR
        uses: actions/cache@v4
        with:
          path: /tmp/graphhopper-web-11.0.jar
          key: gh-jar-graphhopper-web-11.0

      - name: Run Route Conformance (Pipeline-only)
        run: make conformance

      - name: Upload conformance logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-logs
          path: |
            /tmp/gh.log
            /tmp/go.log
