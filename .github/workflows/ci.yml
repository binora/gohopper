name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Unit and Integration Tests
        run: go test ./...

  conformance:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download GraphHopper 11.0 + OSM fixture
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/graphhopper-web-11.0.jar \
            https://repo1.maven.org/maven2/com/graphhopper/graphhopper-web/11.0/graphhopper-web-11.0.jar
          curl -fsSL -o /tmp/monaco.osm.gz \
            https://raw.githubusercontent.com/graphhopper/graphhopper/11.x/core/files/monaco.osm.gz

      - name: Prepare CI Configs
        run: |
          cat > /tmp/gh-config.yml <<'YAML'
          graphhopper:
            datareader.file: /tmp/monaco.osm.gz
            graph.location: /tmp/gh-cache
            profiles:
              - name: car
                custom_model_files: [car.json]
            profiles_ch: []
            profiles_lm: []
            graph.encoded_values: car_access, car_average_speed, road_access
            routing.snap_preventions_default: tunnel, bridge, ferry
            graph.dataaccess.default_type: RAM_STORE
          server:
            application_connectors:
              - type: http
                port: 8090
                bind_host: localhost
            admin_connectors:
              - type: http
                port: 8091
                bind_host: localhost
          logging:
            appenders:
              - type: console
          YAML

          cat > /tmp/go-config.yml <<'YAML'
          graphhopper:
            datareader.file: /tmp/monaco.osm.gz
            graph.location: /tmp/go-cache
            profiles:
              - name: car
                custom_model_files: [car.json]
            profiles_ch: []
            profiles_lm: []
            graph.encoded_values: car_access, car_average_speed, road_access
            routing.snap_preventions_default: tunnel, bridge, ferry
            graph.dataaccess.default_type: RAM_STORE
          server:
            application_connectors:
              - type: http
                port: 8080
                bind_host: localhost
          logging:
            appenders:
              - type: console
          YAML

      - name: Run Route Conformance (Pipeline-only)
        run: |
          set -euo pipefail

          java -Ddw.graphhopper.datareader.file=/tmp/monaco.osm.gz \
            -jar /tmp/graphhopper-web-11.0.jar server /tmp/gh-config.yml > /tmp/gh.log 2>&1 &
          GH_PID=$!

          go run ./cmd/gohopper server /tmp/go-config.yml > /tmp/go.log 2>&1 &
          GO_PID=$!

          cleanup() {
            kill "$GH_PID" "$GO_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8090/health >/dev/null 2>&1 && \
               curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://127.0.0.1:8090/health >/dev/null 2>&1; then
            echo "GraphHopper did not become healthy"
            tail -n 200 /tmp/gh.log || true
            exit 1
          fi
          if ! curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
            echo "GoHopper did not become healthy"
            tail -n 200 /tmp/go.log || true
            exit 1
          fi

          failed=0
          while IFS= read -r case_json; do
            name=$(echo "$case_json" | jq -r '.name')
            method=$(echo "$case_json" | jq -r '.method // "GET"')
            path=$(echo "$case_json" | jq -r '.path')
            body=$(echo "$case_json" | jq -c '.body // empty')

            gh_headers=$(mktemp)
            gh_body=$(mktemp)
            go_headers=$(mktemp)
            go_body=$(mktemp)

            if [ -n "${body}" ]; then
              gh_status=$(curl --globoff -sS -o "$gh_body" -D "$gh_headers" -w '%{http_code}' \
                -X "$method" -H 'Content-Type: application/json' \
                --data "$body" "http://127.0.0.1:8090${path}")
              go_status=$(curl --globoff -sS -o "$go_body" -D "$go_headers" -w '%{http_code}' \
                -X "$method" -H 'Content-Type: application/json' \
                --data "$body" "http://127.0.0.1:8080${path}")
            else
              gh_status=$(curl --globoff -sS -o "$gh_body" -D "$gh_headers" -w '%{http_code}' \
                -X "$method" "http://127.0.0.1:8090${path}")
              go_status=$(curl --globoff -sS -o "$go_body" -D "$go_headers" -w '%{http_code}' \
                -X "$method" "http://127.0.0.1:8080${path}")
            fi

            gh_norm=$(mktemp)
            go_norm=$(mktemp)
            jq -S 'del(.took, .info.took)' "$gh_body" > "$gh_norm" 2>/dev/null || cat "$gh_body" > "$gh_norm"
            jq -S 'del(.took, .info.took)' "$go_body" > "$go_norm" 2>/dev/null || cat "$go_body" > "$go_norm"

            status_ok=1
            body_ok=1
            if [ "$gh_status" != "$go_status" ]; then
              status_ok=0
            fi
            if ! diff -u "$gh_norm" "$go_norm" >/tmp/diff.out 2>&1; then
              body_ok=0
            fi

            if [ "$status_ok" -eq 1 ] && [ "$body_ok" -eq 1 ]; then
              echo "OK   ${name}"
            else
              echo "FAIL ${name}"
              echo "  status gh=${gh_status} go=${go_status}"
              echo "  --- GH body ---"
              cat "$gh_norm"
              echo "  --- GO body ---"
              cat "$go_norm"
              echo "  --- Diff ---"
              cat /tmp/diff.out || true
              failed=$((failed + 1))
            fi

            rm -f "$gh_headers" "$gh_body" "$go_headers" "$go_body" "$gh_norm" "$go_norm"
          done < <(jq -c '.[]' testdata/conformance/route_cases.json)

          if [ "$failed" -ne 0 ]; then
            echo "Conformance failed: ${failed} case(s)"
            exit 1
          fi
